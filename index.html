<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>ABC Voice Agent — Mia</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:'Segoe UI',sans-serif;
      background:#0f172a;color:white;
      display:flex;flex-direction:column;align-items:center;
      padding:40px 20px;min-height:100vh;
    }
    h2{font-size:26px;margin-bottom:6px}
    #subtitle{color:#64748b;font-size:14px;margin-bottom:28px}

    /* Language selector */
    #lang-selector{
      display:flex;gap:10px;margin-bottom:24px;flex-wrap:wrap;justify-content:center;
    }
    .lang-btn{
      padding:10px 24px;font-size:14px;font-weight:600;
      border-radius:20px;border:2px solid #334155;
      background:transparent;color:#94a3b8;cursor:pointer;
      transition:all 0.2s;
    }
    .lang-btn:hover{border-color:#6366f1;color:white}
    .lang-btn.active{
      background:#6366f1;border-color:#6366f1;color:white;
    }

    .btn-row{display:flex;gap:12px;margin-bottom:20px}
    button.call-btn{
      padding:14px 40px;font-size:16px;cursor:pointer;
      border-radius:12px;border:none;font-weight:600;transition:all 0.2s;
    }
    button.call-btn:hover{opacity:.85}
    button.call-btn:disabled{opacity:.4;cursor:not-allowed}
    #start{background:#22c55e;color:white}
    #stop{background:#ef4444;color:white;display:none}

    #status-bar{
      background:#1e293b;border-radius:10px;
      padding:12px 28px;font-size:14px;color:#94a3b8;
      margin-bottom:20px;min-width:320px;text-align:center;
    }

    /* Voice visualizer */
    #visualizer{
      display:flex;align-items:center;justify-content:center;
      gap:4px;height:48px;margin-bottom:16px;
    }
    .bar{
      width:4px;background:#6366f1;border-radius:2px;
      animation:none;transition:height 0.1s;
      height:4px;
    }
    .bar.active{animation:pulse 0.6s ease-in-out infinite alternate;}
    .bar:nth-child(2){animation-delay:0.1s}
    .bar:nth-child(3){animation-delay:0.2s}
    .bar:nth-child(4){animation-delay:0.3s}
    .bar:nth-child(5){animation-delay:0.15s}
    @keyframes pulse{
      from{height:4px}
      to{height:32px}
    }
  </style>
</head>
<body>
  <h2>🎮 ABC Voice Agent</h2>
  <p id="subtitle">Powered by Mia · ABC Games</p>

  <!-- Language selector -->
  <div id="lang-selector">
    <button class="lang-btn active" data-lang="bengali" onclick="selectLang(this)">🇧🇩 Bengali</button>
    <button class="lang-btn"        data-lang="hindi"   onclick="selectLang(this)">🇮🇳 Hindi</button>
    <button class="lang-btn"        data-lang="telugu"  onclick="selectLang(this)">🌿 Telugu</button>
  </div>

  <div class="btn-row">
    <button id="start" class="call-btn" onclick="connectRoom()">📞 Start Call</button>
    <button id="stop"  class="call-btn" onclick="disconnectRoom()">🔴 End Call</button>
  </div>

  <div id="status-bar">⚪ Select a language and start a call</div>

  <!-- Voice activity visualizer (no transcript) -->
  <div id="visualizer">
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/livekit-client@2.5.7/dist/livekit-client.umd.min.js"></script>
  <!-- RNNoise: ML noise cancellation -->
  <script src="https://cdn.jsdelivr.net/npm/@shiguredo/rnnoise-wasm@2024.1.3/dist/rnnoise.js"></script>

  <script>
    const LIVEKIT_URL = "wss://ai-voice-agent-4nwoff2a.livekit.cloud";
    const TOKEN_URL   = "/token";

    let room          = null;
    let audioTracks   = new Map();
    let audioElements = [];
    let selectedLang  = "bengali";

    function selectLang(btn) {
      if (room) return; // prevent switching mid-call
      document.querySelectorAll(".lang-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      selectedLang = btn.dataset.lang;
      setStatus(`⚪ ${btn.textContent} selected — press Start Call`);
    }

    function setStatus(msg) {
      document.getElementById("status-bar").textContent = msg;
    }

    function setVisualizer(active) {
      document.querySelectorAll(".bar").forEach(b => {
        b.classList.toggle("active", active);
      });
    }

    function cleanupAudio() {
      audioElements.forEach(el => { el.pause(); el.remove(); });
      audioElements = [];
      audioTracks.clear();
    }

    // ── RNNoise noise cancellation ─────────────────────────────────────────
    async function enableNoiseCancelledMic(room) {
      try {
        const rawStream = await navigator.mediaDevices.getUserMedia({
          audio: {
            echoCancellation: true,
            noiseSuppression: false,
            autoGainControl: true,
            sampleRate: 48000,
          }
        });

        if (typeof RNNoise !== "undefined") {
          const rnnoise   = await RNNoise.create();
          const audioCtx  = new AudioContext({ sampleRate: 48000 });
          const source    = audioCtx.createMediaStreamSource(rawStream);
          const dest      = audioCtx.createMediaStreamDestination();
          const processor = audioCtx.createScriptProcessor(512, 1, 1);

          processor.onaudioprocess = (e) => {
            const input  = e.inputBuffer.getChannelData(0);
            const output = e.outputBuffer.getChannelData(0);
            const frame  = new Float32Array(480);
            frame.set(input.subarray(0, 480));
            rnnoise.processFrame(frame);
            output.set(frame);
          };

          source.connect(processor);
          processor.connect(dest);

          const cleanTrack = dest.stream.getAudioTracks()[0];
          await room.localParticipant.publishTrack(cleanTrack, {
            name: "microphone",
            source: LivekitClient.Track.Source.Microphone,
          });
          console.log("✅ RNNoise active");
        } else {
          await room.localParticipant.setMicrophoneEnabled(true, {
            echoCancellation: true,
            noiseSuppression: true,
            autoGainControl: true,
          });
        }
      } catch (err) {
        console.warn("⚠️ Noise setup failed:", err);
        await room.localParticipant.setMicrophoneEnabled(true, {
          echoCancellation: true,
          noiseSuppression: true,
          autoGainControl: true,
        });
      }
    }

    async function connectRoom() {
      const startBtn = document.getElementById("start");
      const stopBtn  = document.getElementById("stop");

      if (room) { await room.disconnect(); room = null; }
      cleanupAudio();
      startBtn.disabled = true;

      // Disable language switching during call
      document.querySelectorAll(".lang-btn").forEach(b => b.style.pointerEvents = "none");

      setStatus("⏳ Connecting...");

      try {
        const res  = await fetch(`${TOKEN_URL}?language=${selectedLang}`);
        const data = await res.json();
        if (data.error) { setStatus("❌ " + data.error); startBtn.disabled = false; return; }

        room = new LivekitClient.Room({ adaptiveStream: true, dynacast: true });

        // ── One audio element per track ──────────────────────────────────
        room.on(LivekitClient.RoomEvent.TrackSubscribed, (track, pub, participant) => {
          if (track.kind === LivekitClient.Track.Kind.Audio) {
            if (audioTracks.has(track.sid)) {
              const old = audioTracks.get(track.sid);
              old.pause(); old.remove();
              audioTracks.delete(track.sid);
            }
            const el = track.attach();
            el.autoplay = true;
            el.style.display = "none";
            document.body.appendChild(el);
            audioTracks.set(track.sid, el);
            audioElements.push(el);
            el.play().catch(() => {
              setStatus("🔔 Click anywhere to enable audio");
              document.body.addEventListener("click", () => el.play(), { once: true });
            });
          }
        });

        room.on(LivekitClient.RoomEvent.TrackUnsubscribed, (track) => {
          if (audioTracks.has(track.sid)) {
            const el = audioTracks.get(track.sid);
            track.detach(el); el.pause(); el.remove();
            audioTracks.delete(track.sid);
          }
        });

        // ── Voice activity → animate visualizer (no transcript) ──────────
        room.on(LivekitClient.RoomEvent.ActiveSpeakersChanged, (speakers) => {
          const agentSpeaking = speakers.some(s => s.identity !== "manager-test");
          setVisualizer(agentSpeaking);
          if (agentSpeaking) setStatus("🔊 Mia is speaking...");
          else setStatus("🎙️ Listening...");
        });

        room.on(LivekitClient.RoomEvent.Connected, () => {
          setStatus("✅ Connected — Mia will greet you shortly!");
          startBtn.style.display = "none";
          stopBtn.style.display  = "inline-block";
          startBtn.disabled = false;
        });

        room.on(LivekitClient.RoomEvent.Reconnecting, () => setStatus("🔄 Reconnecting..."));
        room.on(LivekitClient.RoomEvent.Reconnected,  () => setStatus("✅ Reconnected!"));

        room.on(LivekitClient.RoomEvent.Disconnected, () => {
          setStatus("🔌 Call ended");
          startBtn.style.display = "inline-block";
          stopBtn.style.display  = "none";
          startBtn.disabled = false;
          setVisualizer(false);
          document.querySelectorAll(".lang-btn").forEach(b => b.style.pointerEvents = "auto");
          cleanupAudio();
        });

        await room.connect(LIVEKIT_URL, data.token);
        await enableNoiseCancelledMic(room);

      } catch (err) {
        setStatus("❌ Error: " + err.message);
        startBtn.disabled = false;
        document.querySelectorAll(".lang-btn").forEach(b => b.style.pointerEvents = "auto");
        console.error(err);
      }
    }

    async function disconnectRoom() {
      if (room) { await room.disconnect(); room = null; }
      cleanupAudio();
      setVisualizer(false);
      document.querySelectorAll(".lang-btn").forEach(b => b.style.pointerEvents = "auto");
    }
  </script>
</body>
</html>
