<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>ABC Voice Agent — Mia</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
font-family:'Segoe UI',sans-serif;
background:#0f172a;
color:white;
display:flex;
flex-direction:column;
align-items:center;
padding:40px 20px;
min-height:100vh;
}
h2{font-size:26px;margin-bottom:6px}
#subtitle{color:#64748b;font-size:14px;margin-bottom:28px}
.btn-row{display:flex;gap:12px;margin-bottom:20px}

button{
padding:14px 36px;
font-size:16px;
cursor:pointer;
border-radius:12px;
border:none;
font-weight:600;
transition:opacity .2s
}
button:hover{opacity:.85}
button:disabled{opacity:.4;cursor:not-allowed}

#start{background:#22c55e;color:white}
#stop{background:#ef4444;color:white;display:none}

#status-bar{
background:#1e293b;
border-radius:10px;
padding:10px 20px;
font-size:14px;
color:#94a3b8;
margin-bottom:20px;
min-width:320px;
text-align:center
}

#chat{
width:100%;
max-width:560px;
background:#1e293b;
border-radius:14px;
padding:20px;
min-height:200px;
max-height:440px;
overflow-y:auto;
display:flex;
flex-direction:column;
gap:10px
}

.msg{
padding:10px 14px;
border-radius:10px;
font-size:14px;
line-height:1.5;
max-width:85%;
word-wrap:break-word
}

.msg.agent{
background:#334155;
color:#e2e8f0;
align-self:flex-start;
border-bottom-left-radius:2px
}

.msg.user{
background:#2563eb;
color:white;
align-self:flex-end;
border-bottom-right-radius:2px
}

.msg .label{
font-size:11px;
opacity:.6;
margin-bottom:4px;
font-weight:600;
text-transform:uppercase
}

#empty-chat{
color:#475569;
font-size:14px;
text-align:center;
margin:auto
}
</style>
</head>

<body>

<h2>🎮 ABC Voice Agent</h2>
<p id="subtitle">Powered by Mia · ABC Games</p>

<div class="btn-row">
<button id="start" onclick="connectRoom()">📞 Start Call</button>
<button id="stop" onclick="disconnectRoom()">🔴 End Call</button>
</div>

<div id="status-bar">⚪ Not connected</div>
<div id="chat">
<div id="empty-chat">Start a call to begin the conversation</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/livekit-client@2.5.7/dist/livekit-client.umd.min.js"></script>

<script>

const LIVEKIT_URL = "wss://ai-voice-agent-4nwoff2a.livekit.cloud";
const TOKEN_URL = "/token";   // ✅ FIXED (no localhost)

let room = null;
let audioElements = [];

const lastMessage = {agent:"",user:""};

function setStatus(msg){
document.getElementById("status-bar").textContent=msg;
}

function cleanupAudio(){
audioElements.forEach(el=>{el.pause();el.remove()});
audioElements=[];
}

function clearChat(){
document.getElementById("chat").innerHTML='<div id="empty-chat">Start a call to begin the conversation</div>';
lastMessage.agent="";
lastMessage.user="";
}

function addMessage(who,text){

text=text.trim();
if(!text) return;

if(lastMessage[who]===text) return;
lastMessage[who]=text;

const chat=document.getElementById("chat");
const empty=document.getElementById("empty-chat");

if(empty) empty.remove();

const div=document.createElement("div");
div.className="msg "+who;

div.innerHTML=
`<div class="label">${who==="agent"?"🤖 Mia":"🎤 You"}</div>${text}`;

chat.appendChild(div);
chat.scrollTop=chat.scrollHeight;
}

function handleTranscription(segments,participant){

const isAgent = participant && (participant.isAgent || participant.identity !== "manager-test");

const who = isAgent ? "agent" : "user";

segments.forEach(seg=>{
if(!seg.text) return;
if(seg.final===false) return;
addMessage(who,seg.text);
});
}

async function connectRoom(){

const startBtn=document.getElementById("start");
const stopBtn=document.getElementById("stop");

if(room){
await room.disconnect();
room=null;
}

cleanupAudio();
clearChat();

startBtn.disabled=true;

setStatus("⏳ Connecting...");

try{

const res=await fetch(TOKEN_URL);
const data=await res.json();

if(data.error){
setStatus("❌ "+data.error);
startBtn.disabled=false;
return;
}

room=new LivekitClient.Room({
adaptiveStream:true,
dynacast:true
});

room.on(LivekitClient.RoomEvent.TrackSubscribed,(track)=>{

if(track.kind===LivekitClient.Track.Kind.Audio){

const el=track.attach();
el.autoplay=true;
el.style.display="none";

document.body.appendChild(el);

audioElements.push(el);

el.play().catch(()=>{
setStatus("🔔 Click anywhere to enable audio");
document.body.addEventListener("click",()=>el.play(),{once:true});
});
}
});

room.on(LivekitClient.RoomEvent.TranscriptionReceived,handleTranscription);

room.on(LivekitClient.RoomEvent.Connected,()=>{
setStatus("✅ Connected — Mia will greet you shortly!");
startBtn.style.display="none";
stopBtn.style.display="inline-block";
startBtn.disabled=false;
});

room.on(LivekitClient.RoomEvent.Disconnected,()=>{
setStatus("🔌 Disconnected");
startBtn.style.display="inline-block";
stopBtn.style.display="none";
cleanupAudio();
});

await room.connect(LIVEKIT_URL,data.token);

await room.localParticipant.setMicrophoneEnabled(true,{
echoCancellation:true,
noiseSuppression:true,
autoGainControl:true
});

}
catch(err){
setStatus("❌ Error: "+err.message);
startBtn.disabled=false;
console.error(err);
}

}

async function disconnectRoom(){
if(room){
await room.disconnect();
room=null;
}
cleanupAudio();
}

</script>
</body>
</html>
